<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worship Lineup — HISONLY</title>
  <meta name="theme-color" content="#7c3aed"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .lineup-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .lineup-tab {
      flex:1; padding:10px 8px; text-align:center;
      border:1px solid var(--border); border-radius:var(--radius-sm);
      cursor:pointer; font-family:'Outfit',sans-serif; font-size:0.82rem; font-weight:600;
      transition:var(--transition); background:var(--surface); color:var(--text-muted);
    }
    .lineup-tab.active { background:rgba(124,58,237,0.2); border-color:var(--primary-light); color:var(--primary-light); }
    .add-song-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .song-actions { display:flex; gap:8px; margin-top:8px; }
  </style>
</head>
<body>

<div class="page" id="lineup-page">
  <div class="page-header">
    <div>
      <h1 class="page-header-title">Worship Lineup</h1>
      <p class="text-sm text-muted" id="lineup-role-label">View worship song lineup</p>
    </div>
    <span class="badge badge-purple" id="lineup-badge">🎵</span>
  </div>

  <div class="container">
    <!-- Date Selector -->
    <div class="form-group">
      <label class="form-label" for="lineup-date">Service Date</label>
      <select class="form-select" id="lineup-date">
        <option value="">Select service date…</option>
      </select>
    </div>

    <!-- Lineup Panel -->
    <div id="lineup-songs-panel" class="hidden">
      <!-- Add lineup form (leader/admin only) -->
      <div class="add-song-form" id="add-song-form">
        <div class="section-title" style="margin-bottom:12px;">➕ Submit Playlist</div>
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Spotify Playlist URL</label>
          <input class="form-input" id="song-title" placeholder="https://open.spotify.com/playlist/..." type="text"/>
        </div>
        <button class="btn btn-gold btn-sm w-full" id="add-song-btn" style="width:100%;">Submit Lineup ✨</button>
      </div>

      <!-- Lineup Display -->
      <div class="section-title">Current Lineup</div>
      <div id="songs-list"></div>

      <div id="songs-empty" class="empty-state hidden">
        <div class="empty-icon">🎵</div>
        <p>No lineup submitted yet.<br>Submit the Spotify playlist for this service.</p>
      </div>

      <div id="lineup-readonly-msg" class="hidden">
        <div class="card" style="text-align:center;padding:20px;">
          <div style="font-size:2rem;margin-bottom:8px;">🔒</div>
          <div class="text-sm text-muted">Only Worship Leaders and Admins can edit the lineup.</div>
        </div>
      </div>
    </div>

    <div id="lineup-no-selection" class="empty-state">
      <div class="empty-icon">🎙️</div>
      <p>Select a service date to view or set the lineup.</p>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-item" data-nav="home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="calendar.html" class="nav-item" data-nav="calendar"><span class="nav-icon">📅</span><span class="nav-label">Calendar</span></a>
  <a href="lineup.html" class="nav-item active" data-nav="lineup"><span class="nav-icon">🎵</span><span class="nav-label">Lineup</span></a>
  <a href="team.html" class="nav-item" data-nav="team"><span class="nav-icon">👥</span><span class="nav-label">Team</span></a>
  <a href="profile.html" class="nav-item" data-nav="profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<script src="js/app.js"></script>
<script>
const user = requireAuth();
if (!user) throw '';

const canEdit = user.role === 'singer' || user.isLeader;
if (canEdit) {
  document.getElementById('lineup-badge').textContent = '🎙️ Editor';
  document.getElementById('lineup-role-label').textContent = 'Set your worship song lineup';
}

let selectedDk = null;
let selectedSlot = null;

// Populate dates
const dateSelect = document.getElementById('lineup-date');
const dates = getUpcomingServiceDates(3);
dates.forEach(dk => {
  const d = new Date(dk.replace(/-/g, '/'));
  const opt = document.createElement('option');
  opt.value = dk;
  opt.textContent = formatDate(dk) + (isSunday(d) ? ' — Sunday' : ' — Wednesday');
  dateSelect.appendChild(opt);
});

dateSelect.addEventListener('change', () => {
  selectedDk = dateSelect.value;
  if (!selectedDk) {
    document.getElementById('lineup-no-selection').classList.remove('hidden');
    document.getElementById('lineup-songs-panel').classList.add('hidden');
    return;
  }
  document.getElementById('lineup-no-selection').classList.add('hidden');
  selectedSlot = 'default'; // Using a default slot since multiple slots are removed
  await loadLineup();
});

async function loadLineup() {
  document.getElementById('lineup-songs-panel').classList.remove('hidden');
  if (canEdit) {
    document.getElementById('add-song-form').classList.remove('hidden');
    document.getElementById('lineup-readonly-msg').classList.add('hidden');
  } else {
    document.getElementById('add-song-form').classList.add('hidden');
    document.getElementById('lineup-readonly-msg').classList.remove('hidden');
  }
  await renderLineup();
}

async function getSlotLineup() {
  const lineups = await DB.getLineups();
  if (!lineups[selectedDk]) lineups[selectedDk] = {};
  if (!lineups[selectedDk][selectedSlot]) lineups[selectedDk][selectedSlot] = { spotifyUrl: '' };
  return lineups;
}

async function renderLineup() {
  const lineups = await getSlotLineup();
  const data = lineups[selectedDk][selectedSlot];
  const list = document.getElementById('songs-list');
  const empty = document.getElementById('songs-empty');

  if (!data.spotifyUrl) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  let embedHtml = '';
  const url = data.spotifyUrl;
  if (url.includes('spotify.com')) {
    let embedUrl = url.replace('open.spotify.com/', 'open.spotify.com/embed/');
    if (embedUrl.includes('?')) embedUrl = embedUrl.split('?')[0];
    embedHtml = `
      <div style="border-radius:12px; overflow:hidden; margin-bottom:16px;">
        <iframe src="${embedUrl}" width="100%" height="352" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
      </div>
    `;
  }

  list.innerHTML = `
    <div class="card" style="padding:16px;">
      <div style="font-weight:700; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
        <span>Spotify Playlist</span>
        ${canEdit ? `<button class="btn btn-danger btn-sm" onclick="removeLineup()">Remove ✕</button>` : ''}
      </div>
      ${embedHtml}
      <a href="${url}" target="_blank" class="btn btn-outline btn-sm w-full" style="text-align:center; display:block; text-decoration:none;">Open in Spotify ↗</a>
    </div>
  `;
}

document.getElementById('add-song-btn').addEventListener('click', async () => {
  const url = document.getElementById('song-title').value.trim();
  if (!url) { showToast('Please enter a Spotify URL', 'error'); return; }
  if (!url.includes('spotify.com')) { showToast('Invalid Spotify URL', 'error'); return; }
  
  const lineups = await getSlotLineup();
  lineups[selectedDk][selectedSlot] = { spotifyUrl: url, addedBy: user.id, updatedAt: new Date().toISOString() };
  await DB.saveLineups(lineups);
  document.getElementById('song-title').value = '';
  showToast('Playlist submitted! 🎵', 'success');
  await renderLineup();
});

async function removeLineup() {
  if (!confirm('Remove this playlist?')) return;
  const lineups = await getSlotLineup();
  lineups[selectedDk][selectedSlot] = { spotifyUrl: '' };
  await DB.saveLineups(lineups);
  showToast('Playlist removed.', 'info');
  await renderLineup();
}
</script>
</body>
</html>
