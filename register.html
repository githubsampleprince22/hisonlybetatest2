<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join HISONLY — Register</title>
  <meta name="theme-color" content="#7c3aed"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page page-auth" style="justify-content:flex-start;padding-top:40px;padding-bottom:40px;">
  <div class="logo-wrap" style="margin-bottom:20px;">
    <img src="hisonly.jpg" alt="HisOnly Praise & Worship" class="brand-logo" style="max-height:70px;"/>
  </div>

  <div class="card" style="width:100%;max-width:400px;">
    <h2 style="margin-bottom:6px;">Join the Team</h2>
    <p class="text-sm text-muted" style="margin-bottom:20px;">Set up your HISONLY Worship profile</p>

    <form id="reg-form">
      <!-- Name & Email -->
      <div class="form-group">
        <label class="form-label" for="reg-name">Full Name</label>
        <input class="form-input" type="text" id="reg-name" placeholder="Juan dela Cruz" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-username">Username <span style="color:var(--danger)">*</span></label>
        <input class="form-input" type="text" id="reg-username" placeholder="e.g. juan_worship" required autocomplete="username" pattern="[a-zA-Z0-9_.]+" title="Letters, numbers, underscores and dots only"/>
        <p class="text-xs text-muted" style="margin-top:5px;">Used for login. No spaces allowed.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email <span style="font-weight:400;color:var(--text-dim)">(optional)</span></label>
        <input class="form-input" type="email" id="reg-email" placeholder="your@email.com (optional)" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input class="form-input" type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6"/>
      </div>

      <hr class="divider"/>

      <!-- Role Selection -->
      <div class="form-group">
        <label class="form-label">Your Role</label>
        <div class="role-group">
          <div class="role-pill" data-role="singer" id="pill-singer">
            <span class="emoji">🎤</span><span class="label">Singer</span>
          </div>
          <div class="role-pill" data-role="worship-leader" id="pill-worship-leader">
            <span class="emoji">🎙️</span><span class="label">Worship Leader</span>
          </div>
          <div class="role-pill" data-role="musician" id="pill-musician">
            <span class="emoji">🎸</span><span class="label">Musician</span>
          </div>
          <div class="role-pill" data-role="multimedia" id="pill-multimedia">
            <span class="emoji">🎬</span><span class="label">Multimedia</span>
          </div>
        </div>
        <input type="hidden" id="reg-role" required/>
      </div>

      <!-- Instrument (musician) -->
      <div class="form-group hidden" id="instrument-group">
        <label class="form-label" for="reg-instrument">Instrument</label>
        <select class="form-select" id="reg-instrument">
          <option value="">Select instrument…</option>
          <option>Guitar</option>
          <option>Bass Guitar</option>
          <option>Drums</option>
          <option>Keyboard / Piano</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Multimedia specialty -->
      <div class="form-group hidden" id="specialty-group">
        <label class="form-label" for="reg-specialty">Multimedia Role</label>
        <select class="form-select" id="reg-specialty">
          <option value="">Select specialty…</option>
          <option>Video Camera</option>
          <option>Photography</option>
          <option>Screener (Lyrics / Slides)</option>
          <option>OBS Operator</option>
          <option>Lights</option>
        </select>
      </div>

      <hr class="divider"/>

      <!-- Admin / Leader Code -->
      <div class="form-group">
        <label class="form-label" for="reg-code">Special Code <span style="font-weight:400;color:var(--text-dim)">(optional)</span></label>
        <input class="form-input" type="text" id="reg-code" placeholder="Admin or Leader code"/>
        <p class="text-xs text-muted" style="margin-top:6px;">Leave blank if you're a regular team member.</p>
      </div>

      <button class="btn btn-primary" type="submit" id="reg-btn">Create Account 🙌</button>
    </form>

    <div class="divider"></div>
    <p class="text-center text-sm text-muted">
      Already a member? <a href="index.html" style="color:var(--primary-light);font-weight:600;">Sign In</a>
    </p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
if (DB.getCurrentUser()) window.location.href = 'home.html';

// Role pill selection
let selectedRole = '';
document.querySelectorAll('.role-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    selectedRole = pill.dataset.role;
    document.getElementById('reg-role').value = selectedRole;
    // Show/hide sub-fields
    document.getElementById('instrument-group').classList.toggle('hidden', selectedRole !== 'musician');
    document.getElementById('specialty-group').classList.toggle('hidden', selectedRole !== 'multimedia');
  });
});

document.getElementById('reg-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!selectedRole) { showToast('Please select your role', 'error'); return; }

  const role = selectedRole;
  const instrument = role === 'musician' ? document.getElementById('reg-instrument').value : null;
  const specialty = role === 'multimedia' ? document.getElementById('reg-specialty').value : null;
  if (role === 'musician' && !instrument) { showToast('Please select your instrument', 'error'); return; }
  if (role === 'multimedia' && !specialty) { showToast('Please select your multimedia role', 'error'); return; }

  const btn = document.getElementById('reg-btn');
  btn.textContent = 'Creating…'; btn.disabled = true;

  const result = await registerUser({
    name: document.getElementById('reg-name').value,
    username: document.getElementById('reg-username').value,
    email: document.getElementById('reg-email').value,
    password: document.getElementById('reg-password').value,
    role, instrument, specialty,
    adminCode: document.getElementById('reg-code').value.trim(),
  });

  if (result.ok) {
    DB.setCurrentUser(result.user);
    showToast('Welcome to HISONLY! 🙏', 'success');
    setTimeout(() => window.location.href = 'home.html', 900);
  } else {
    showToast(result.error, 'error');
    btn.textContent = 'Create Account 🙌'; btn.disabled = false;
  }
});
</script>
</body>
</html>
