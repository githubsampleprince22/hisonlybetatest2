<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home — HISONLY</title>
  <meta name="theme-color" content="#7c3aed"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .hero-banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(245,158,11,0.1));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .hero-banner::after {
      content: '🎵';
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 4rem;
      opacity: 0.15;
    }
    .hero-greeting { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
    .hero-name { font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800; }
    .hero-role { margin-top: 8px; }

    .next-service-card {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-purple);
    }
    .next-service-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; margin-bottom: 8px; }
    .next-service-date { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .next-service-time { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    .lineup-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .lineup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="page" id="home-page">
  <div class="page-header" style="padding-top:56px;">
    <div>
      <img src="hisonly.jpg" alt="HisOnly" class="brand-logo" style="max-height:36px;"/>
    </div>
    <div id="home-avatar" class="avatar" style="cursor:pointer;" onclick="window.location='profile.html'"></div>
  </div>

  <div class="container">
    <!-- Hero -->
    <div class="hero-banner">
      <div class="hero-greeting">Good to see you,</div>
      <div class="hero-name" id="hero-name">Loading…</div>
      <div class="hero-role" id="hero-role-badge"></div>
    </div>

    <!-- Next Assigned Service -->
    <div class="section-title">📅 Your Next Service</div>
    <div id="next-service-wrap"></div>

    <!-- Lineup Preview -->
    <div class="section-title" style="margin-top:20px;">🎵 This Week's Lineup</div>
    <div id="lineup-preview-wrap"></div>

    <!-- All upcoming assignments -->
    <div class="section-title" style="margin-top:20px;">🗓️ Your Schedule</div>
    <div id="assignments-wrap"></div>

    <!-- Admin quick links -->
    <div id="admin-section" class="hidden">
      <div class="section-title" style="margin-top:20px;">⚡ Admin Tools</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <a href="schedule.html" class="card" style="text-align:center;text-decoration:none;padding:18px 12px;">
          <div style="font-size:1.8rem;margin-bottom:6px;">📋</div>
          <div style="font-size:0.85rem;font-weight:600;">Assign Schedule</div>
        </a>
        <a href="team.html" class="card" style="text-align:center;text-decoration:none;padding:18px 12px;">
          <div style="font-size:1.8rem;margin-bottom:6px;">👥</div>
          <div style="font-size:0.85rem;font-weight:600;">Manage Team</div>
        </a>
      </div>
    </div>

    <!-- Lineup quick link for leaders -->
    <div id="leader-section" class="hidden" style="margin-bottom:20px;">
      <a href="lineup.html" class="card" style="display:flex;align-items:center;gap:14px;text-decoration:none;padding:16px 18px;">
        <div style="font-size:1.8rem;">🎙️</div>
        <div>
          <div style="font-weight:700;">Set Worship Lineup</div>
          <div class="text-sm text-muted">Add songs for Sunday or Wednesday</div>
        </div>
        <div style="margin-left:auto;color:var(--text-dim);">›</div>
      </a>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-item active" data-nav="home">
    <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
  </a>
  <a href="calendar.html" class="nav-item" data-nav="calendar">
    <span class="nav-icon">📅</span><span class="nav-label">Calendar</span>
  </a>
  <a href="lineup.html" class="nav-item" data-nav="lineup">
    <span class="nav-icon">🎵</span><span class="nav-label">Lineup</span>
  </a>
  <a href="team.html" class="nav-item" data-nav="team">
    <span class="nav-icon">👥</span><span class="nav-label">Team</span>
  </a>
  <a href="profile.html" class="nav-item" data-nav="profile">
    <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
  </a>
</nav>

<script src="js/app.js"></script>
<script>
const user = requireAuth();
if (!user) throw '';

// Fill header avatar
document.getElementById('home-avatar').textContent = getInitials(user.name);

// Hero
document.getElementById('hero-name').textContent = user.name.split(' ')[0];
const rd = getRoleDisplay(user);
document.getElementById('hero-role-badge').innerHTML = `
  <span class="badge badge-purple">${rd.emoji} ${rd.label}${rd.sub ? ' · ' + rd.sub : ''}</span>
  ${user.isAdmin ? '<span class="badge badge-gold" style="margin-left:6px;">⭐ Admin</span>' : ''}
`;

// Admin/Leader sections
if (user.isAdmin) document.getElementById('admin-section').classList.remove('hidden');
if (user.isAdmin || user.isLeader) document.getElementById('leader-section').classList.remove('hidden');

// Next Service
async function renderNextService() {
  const assignments = await getUserAssignments(user.id);
  const today = dateKey(new Date());
  const upcoming = assignments.filter(a => a.dateKey >= today);
  const wrap = document.getElementById('next-service-wrap');
  if (!upcoming.length) {
    wrap.innerHTML = `<div class="card" style="text-align:center;padding:28px 16px;">
      <div style="font-size:2rem;margin-bottom:8px;">🙏</div>
      <div class="text-sm text-muted">No upcoming assignments yet.<br>Check your availability in the Calendar!</div>
    </div>`;
    return;
  }
  const next = upcoming[0];
  const slotLabel = next.slot === '8am' ? '8:00 AM Service' : next.slot === '10am' ? '10:00 AM Service' : 'Wednesday Service';
  wrap.innerHTML = `<div class="next-service-card">
    <div class="next-service-label">Next Assigned Service</div>
    <div class="next-service-date">${formatDate(next.dateKey)}</div>
    <div class="next-service-time">⏰ ${slotLabel}</div>
  </div>`;
}

// Lineup Preview
async function renderLineupPreview() {
  const assignments = await getUserAssignments(user.id);
  const today = dateKey(new Date());
  const upcoming = assignments.filter(a => a.dateKey >= today);
  const wrap = document.getElementById('lineup-preview-wrap');
  if (!upcoming.length) { wrap.innerHTML = ''; return; }
  const next = upcoming[0];
  const lineup = await getLineup(next.dateKey, next.slot);
  if (!lineup || !lineup.songs || !lineup.songs.length) {
    wrap.innerHTML = `<div class="lineup-preview">
      <div class="lineup-header"><span class="section-title" style="margin:0;">No lineup posted yet</span></div>
      <p class="text-sm text-muted">Your worship leader hasn't posted the lineup for ${formatShortDate(next.dateKey)} yet.</p>
    </div>`;
    return;
  }
  const songs = lineup.songs.slice(0, 3);
  wrap.innerHTML = `<div class="lineup-preview">
    <div class="lineup-header">
      <span style="font-weight:700;font-size:0.95rem;">${formatShortDate(next.dateKey)}</span>
      <a href="lineup.html" class="badge badge-purple">View All</a>
    </div>
    ${songs.map((s,i) => `<div class="song-item">
      <div class="song-number">${i+1}</div>
      <div class="song-details">
        <div class="song-title">${s.title}</div>
        <div class="song-key">Key: ${s.key}</div>
        ${s.notes ? `<div class="song-notes">${s.notes}</div>` : ''}
      </div>
    </div>`).join('')}
  </div>`;
}

// All Assignments
async function renderAssignments() {
  const assignments = await getUserAssignments(user.id);
  const today = dateKey(new Date());
  const upcoming = assignments.filter(a => a.dateKey >= today).slice(0, 6);
  const wrap = document.getElementById('assignments-wrap');
  if (!upcoming.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No upcoming schedules assigned.</p></div>`;
    return;
  }
  wrap.innerHTML = upcoming.map(a => {
    const slotLabel = a.slot === '8am' ? '8:00 AM' : a.slot === '10am' ? '10:00 AM' : 'Wednesday';
    const isWed = a.slot === 'wed';
    return `<div class="sched-card ${isWed ? '' : 'gold'}">
      <div class="sched-date">${formatDate(a.dateKey)}</div>
      <div class="sched-service">⏰ ${slotLabel} Service</div>
    </div>`;
  }).join('');
}

async function initHome() {
  await renderNextService();
  await renderLineupPreview();
  await renderAssignments();
}
initHome();
</script>
</body>
</html>
